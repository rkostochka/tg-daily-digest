name: daily-digest

on:
  schedule:
    # 8:00 МСК = 5:00 UTC, ежедневно
    - cron: "0 5 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TARGET_CHAT_ID: ${{ secrets.TARGET_CHAT_ID }}
          FOLDERS: ${{ vars.FOLDERS || 'Fin,Interests,Data,News' }}
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '24' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'google/gemini-2.0-flash-exp:free' }}
        run: python -m src.main
